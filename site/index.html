<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Recipes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1 class="logo" id="home-link">🍳 Our Recipes</h1>
    <input id="search" type="search" placeholder="Search recipes or ingredients…" autocomplete="off" />
    <div class="lang-switch" id="lang-switch" role="group" aria-label="Language"></div>
  </header>

  <main id="app">
    <!-- List view -->
    <section id="list-view">
      <div class="filters" id="filters"></div>
      <p class="count" id="count"></p>
      <div class="grid" id="grid"></div>
      <p class="empty" id="empty" hidden>No recipes match. Try clearing filters or search.</p>
    </section>

    <!-- Detail view -->
    <article id="detail-view" hidden></article>
  </main>

  <footer class="foot">
    <span id="foot-count"></span>
  </footer>

  <!-- Data is generated by scripts/build.mjs. Loaded as a plain script so the
       page works even when opened directly from disk (file://). -->
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
